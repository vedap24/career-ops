<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career-Ops — AI Job Evaluation & Resume Tailoring</title>
  <meta name="description" content="Paste a job posting URL — get a detailed AI-powered evaluation breakdown and a tailored resume draft in seconds.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Open Graph / Social Previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Career-Ops — AI Job Evaluation & Resume Tailoring">
  <meta property="og:description" content="Paste a job URL, get a detailed Career-Ops evaluation breakdown and a tailored resume draft. Free, open-source, powered by Gemini.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:url" content="https://career-ops-try.vercel.app">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Career-Ops — AI Job Evaluation & Resume Tailoring">
  <meta name="twitter:description" content="Paste a job URL, get a detailed evaluation breakdown and a tailored resume draft.">
  <meta name="twitter:image" content="/og-image.png">

  <!-- Theme -->
  <meta name="theme-color" content="#0B1121">

  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Header (injected by JS) -->
    <header class="app-header" id="header"></header>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>

    <!-- Main content (pages rendered here) -->
    <main class="page">
      <div class="container" id="page-content">
        <!-- Loading state while JS initializes -->
        <div class="loading-overlay">
          <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
          <p>Loading Career-Ops...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- App scripts (order matters) -->
  <script src="/js/api.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/score-card.js"></script>
  <script src="/js/components/status-badge.js"></script>
  <script src="/js/pages/intake.js"></script>
  <script src="/js/pages/evaluation.js"></script>
  <script src="/js/pages/resume.js"></script>
  <script src="/js/pages/tracker.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
