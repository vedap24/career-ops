<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Career-Ops MVP — Paste a job URL, get AI-powered evaluation and a tailored resume draft.">
  <title>Career-Ops — AI Job Evaluation & Resume Tailoring</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Header (injected by JS) -->
    <header class="app-header" id="header"></header>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>

    <!-- Main content (pages rendered here) -->
    <main class="page">
      <div class="container" id="page-content">
        <!-- Loading state while JS initializes -->
        <div class="loading-overlay">
          <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
          <p>Loading Career-Ops...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- App scripts (order matters) -->
  <script src="/js/api.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/score-card.js"></script>
  <script src="/js/components/status-badge.js"></script>
  <script src="/js/pages/intake.js"></script>
  <script src="/js/pages/evaluation.js"></script>
  <script src="/js/pages/resume.js"></script>
  <script src="/js/pages/tracker.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
